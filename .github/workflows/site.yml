name: Site

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Default permission for verification jobs.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run check

      - run: npm run build

      - run: npm run check:links

      - run: npm run test:e2e

      # Temporarily disabled.
      # The site should deploy after successful checks on main without release gating.
      #
      # - id: release
      #   run: npm run release:status

      - if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest

    # Permissions required by GitHub Pages deployment.
    permissions:
      contents: read
      pages: write
      id-token: write

    # Prevent concurrent GitHub Pages deployments.
    concurrency:
      group: pages
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4